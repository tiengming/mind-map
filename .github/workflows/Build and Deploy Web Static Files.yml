name: Build and Deploy Web Static Files

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies for simple-mind-map
        run: |
          cd simple-mind-map
          npm install
          # 如果你有类型需求，可加 npm run types
          # 如果你有 build 步骤（如生成 dist），请补充 npm run build

      - name: Install dependencies for web
        run: |
          cd web
          npm install

      - name: Build web project
        run: |
          cd web
          npm run build

      - name: Copy index.html to dist
        run: |
          cp web/index.html web/dist/index.html || true

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web/dist
          publish_branch: gh-pages
